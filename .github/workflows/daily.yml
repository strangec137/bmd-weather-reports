name: Daily BMD Weather PDF Download

on:
  schedule:
    # Runs at 14:00 UTC = 8:00 PM Bangladesh time (BST = UTC+6)
    # BMD usually publishes the report by evening
    - cron: '0 16 * * *'

  # Allow manual trigger from GitHub website anytime
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit PDFs back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push PDF + log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/ download_log.csv
          git diff --cached --quiet || git commit -m "Daily BMD report $(date +'%Y-%m-%d')"
          git push
